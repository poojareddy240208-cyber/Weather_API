services:

  api:
    build: .
    container_name: weather-api

    ports:
      - "8000:8000"

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

    env_file:
      - .env

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    container_name: weather-redis

    ports:
      - "6379:6379"